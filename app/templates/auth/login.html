<!DOCTYPE html>
<html>
<head>
<title>Log in</title>
<link rel="stylesheet" href="login-css.css">
</head>
<body>
	<h1>Вход</h1>
	<form method = "POST">
		{{ form.hidden_tag() }}
		{{ form.username }}
		{{ form.password }}
		{{ form.submit }}
	</form>

	<a href = "{{ url_for('auth.register') }}">Нет аккаунта? Зарегистрироваться </a>
	{% with messages = get_flashed_messages(with_categories=true) %}
		{% if messages %}
			{% for category, message in messages %}
				<div class="{{ category }}">
					{{ message }}
				</div>
			{% endfor %}
		{% endif %}
	{% endwith %}
</body>
