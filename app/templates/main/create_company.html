{% extends 'base.html' %}

{% block content %}

<h1 class="mb-6 text-center text-2xl font-bold">Добавить команию</h1>

<form method="POST" class="mx-auto grid max-w-lg grid-cols-[140px_1fr] gap-4 justify-center">

    <label>Название</label>
    <input type="text" name="name" value="{{ company.name if company else '' }}" required class="input">

    <label>Регион</label>
    <input type="text" name="region" value="{{ company.region if company else '' }}" required class="input">

    <div></div>
    <button type="submit" class="button button-primary">Сохранить</button>

</form>

{% endblock %}
