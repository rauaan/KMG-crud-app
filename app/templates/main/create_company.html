{% extends 'base.html' %}

{% block body %}

<h1>Добавить команию</h1>

<form method="POST">

    <label>Название</label>
    <input type="text" name="name" value="{{ company.name if company else '' }}" required>

    <label>Регион</label>
    <input type="text" name="region" value="{{ company.region if company else '' }}" required>

    <button type="submit">Сохранить</button>

</form>

{% endblock %}
