{% extends 'base.html' %}

{% block head %}
    <title>App</title> 
{% endblock %}

{% block body %}

    <main class="content">

        <div class="data-row">
            <h1>Данные</h1>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <label for = "upload" id="label-upload">Выберите файл</label>
                <span id="file-name">-</span>
                <input type="file" name="excel_file" accept=".xlsx,.xls" id="upload" required>
                <button type="submit">Загрузить</button>
            </form>

            <form action="/download" method="GET" enctype="multipart/form-data">
                <button type="submit">Скачать</button>
            </form>
        </div>           


        <div class="data-row">
            <h1>Добавить</h1>

            <a href="{{ url_for('companies.create_company') }}">
                <button>Добавить компанию</button>
            </a>
        </div>

        {% if companies | length < 1 %}
        <h1> Нет Данных </h1>
        {% else %}
        {% for company in companies %}
        <div class="data-row">

            <div class="data-info">
                <span>{{ company.id }}</span>
                <span>{{ company.name }}</span>
                <span>{{ company.region }}</span>
            </div>

            <div class="data-actions">
                <a href="{{ url_for('companies.edit_company', id=company['id']) }}" method="POST">
                    <button class="info-btn"> Редактировать </button>
                </a>
                <form action="{{ url_for('companies.delete_company', id=company['id']) }}" method="POST">
                    <button class="deleste-btn" type="submit" onclick="return confirm('Вы уверены что хотите удалить сотрудника?');"> Удалить </button>
                </form>
            </div>

        </div>
        {% endfor %}
        {% endif %}

    </main> 

{% endblock %}
