<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <title>{% block title %}KMG{% endblock %}</title>
    {% block head %}{% endblock %}
</head>

<body class="flex min-h-screen">
{% block sidebar %}
<aside class="sticky top-0 flex h-screen w-64 shrink-0 flex-col justify-between bg-gray-900 text-white">
    <nav>
        <div class="px-4 py-5 text-lg font-semibold tracking-tight">KMG</div>
        <ul class="mt-2 space-y-0.5 px-2">
            <li>
                <a href="{{ url_for('users.users') }}"
                   class="flex items-center gap-5 rounded-lg px-3 py-2 text-sm transition-colors
                       {{ 'bg-gray-800 text-white' if request.endpoint and request.endpoint.startswith('users.') else 'text-gray-300 hover:bg-gray-800 hover:text-white' }}">
                    <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Сотрудники
                </a>
            </li>
            <li>
                <a href="{{ url_for('companies.companies') }}"
                   class="flex items-center gap-5 rounded-lg px-3 py-2 text-sm transition-colors
                       {{ 'bg-gray-800 text-white' if request.endpoint and request.endpoint.startswith('companies.') else 'text-gray-300 hover:bg-gray-800 hover:text-white' }}">
                    <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 21h18M6 21V7l6-4 6 4v14M9 9h1M9 13h1M14 9h1M14 13h1M10 21v-4h4v4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Компании
                </a>
            </li>
            <li>
                <a href="{{ url_for('wells.wells') }}"
                   class="flex items-center gap-5 rounded-lg px-3 py-2 text-sm transition-colors
                       {{ 'bg-gray-800 text-white' if request.endpoint and request.endpoint.startswith('wells.') else 'text-gray-300 hover:bg-gray-800 hover:text-white' }}">
                    <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M8 6l4-4 4 4M6 10h12M7 14h10M8 18h8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Скважины
                </a>
            </li>
            <li>
                <a href="{{ url_for('daily_productions.daily_productions') }}"
                   class="flex items-center gap-5 rounded-lg px-3 py-2 text-sm transition-colors
                       {{ 'bg-gray-800 text-white' if request.endpoint and request.endpoint.startswith('daily_productions.') else 'text-gray-300 hover:bg-gray-800 hover:text-white' }}">
                    <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 2h6l3 3v17H6V5l3-3z" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 12h6M9 16h6M9 8h2" stroke-linecap="round"/>
                    </svg>
                    Рапорты
                </a>
            </li>
        </ul>
    </nav>
    <a href="{{ url_for('auth.logout') }}" class="flex items-center gap-5 border-t border-gray-800 px-4 py-3 text-sm text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">
        <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Выйти
    </a>
</aside>
{% endblock %}

    <main class="h-screen flex-1 overflow-y-auto p-6">
        <div class="mx-auto max-w-7xl">
        {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
