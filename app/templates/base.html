<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <title>{% block title %}KMG{% endblock %}</title>
    {% block head %}{% endblock %}
</head>

<body class="flex min-h-screen">

    {% block sidebar %}
    <aside class="sticky top-0 flex h-screen w-64 shrink-0 flex-col justify-between bg-gray-900 text-white">
        <nav>
            <div class="px-4 py-5 text-lg font-semibold tracking-tight">KMG</div>
            <ul class="mt-2 space-y-0.5 px-2">
                <li><a href="{{ url_for('users.users') }}" class="block rounded-lg px-3 py-2 text-sm text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">Сотрудники</a></li>
                <li><a href="{{ url_for('companies.companies') }}" class="block rounded-lg px-3 py-2 text-sm text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">Компании</a></li>
                <li><a href="{{ url_for('wells.wells') }}" class="block rounded-lg px-3 py-2 text-sm text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">Скважины</a></li>
                <li><a href="{{ url_for('daily_productions.daily_productions') }}" class="block rounded-lg px-3 py-2 text-sm text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">Рапорты</a></li>
            </ul>
        </nav>
        <a href="{{ url_for('auth.logout') }}" class="block border-t border-gray-800 px-4 py-3 text-sm text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">Выйти</a>
    </aside>
    {% endblock %}

    <main class="h-screen flex-1 overflow-y-auto p-6">
        <div class="mx-auto max-w-7xl">
        {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
